<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaCloud CRUD App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>MediaCloud CRUD</h1>
      <p>Upload, view, update and delete media files using Azure cloud services.</p>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Upload Media</h2>

      <form id="mediaForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Enter media title" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Enter short description" required></textarea>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option value="Image">Image</option>
            <option value="Video">Video</option>
            <option value="Document">Document</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mediaFile">Choose file</label>
          <input type="file" id="mediaFile" required />
        </div>

        <button type="submit" class="btn primary">Upload Media</button>
      </form>

      <p id="statusMessage" class="status"></p>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Media Items</h2>
        <button id="refreshBtn" class="btn secondary">Refresh</button>
      </div>

      <div id="mediaList" class="media-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
